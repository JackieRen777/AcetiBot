services:
  - type: web
    name: acetibot-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python ingest.py
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SILICONFLOW_API_KEY
        sync: false
      - key: SILICONFLOW_CHAT_MODEL
        value: deepseek-ai/DeepSeek-R1-0528-Qwen3-8B
      - key: SILICONFLOW_STREAM_CHAT_MODEL
        value: deepseek-ai/DeepSeek-V3
      - key: SILICONFLOW_REWRITE_MODEL
        value: deepseek-ai/DeepSeek-V3
      - key: SILICONFLOW_ANSWER_MAX_TOKENS
        value: "700"
      - key: SILICONFLOW_REWRITE_MAX_TOKENS
        value: "120"
      - key: SILICONFLOW_TIMEOUT_SECONDS
        value: "60"
      - key: RAG_TOP_K
        value: "3"
      - key: RAG_REWRITE_THRESHOLD
        value: "18"
      - key: RAG_MAX_NODE_CHARS
        value: "900"
      - key: RAG_MAX_CONTEXT_CHARS
        value: "2600"

  - type: web
    name: acetibot-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_HOST
        fromService:
          name: acetibot-api
          type: web
          envVarKey: RENDER_EXTERNAL_HOSTNAME
